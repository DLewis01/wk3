<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONIAC Display</title>

<style>

*{
    box-sizing:border-box;
    user-select:none;
}

body{
    margin:0;
    background:#eef2f5;
    font-family:Arial,Helvetica,sans-serif;
    overflow:hidden;
}

#topbar{
    height:70px;
    background:#222;
    color:white;
    display:flex;
    align-items:center;
    padding:10px 20px;
    gap:20px;
    font-weight:bold;
}

#stats{
    display:flex;
    gap:18px;
    flex-wrap:wrap;
}

.stat{
    background:#333;
    padding:6px 12px;
    border-radius:10px;
}

#view{
    position:absolute;
    top:70px;
    left:0;
    right:0;
    bottom:0;
    overflow:auto;
    background:#cfd8df;
}

svg{
    display:block;
    background:
        radial-gradient(circle at top,#f7fbff,#dce4ea);
}
.pipeOuter{
    fill:none;
    stroke:#111;
    stroke-width:18;
    stroke-linejoin:round;
    stroke-linecap:round;
}

.pipeInner{
    fill:none;
    stroke:#43d9ff;
    stroke-width:8;
    stroke-linejoin:round;
    stroke-linecap:round;
}

.flowDot{
    fill:#8fffff;
    filter:url(#glow);
}

.tankGlass{
    fill:rgba(255,255,255,0.22);
    stroke:#111;
    stroke-width:5;
}

.water{
    fill:#3fd8ff;
}

.label{
    font-size:18px;
    font-weight:bold;
    text-anchor:middle;
}

.value{
    font-size:14px;
    font-weight:bold;
    text-anchor:middle;
}

.valve{
    fill:white;
    stroke:#111;
    stroke-width:4;
}

.sliderBox{
    width:130px;
    background:white;
    border:3px solid black;
    border-radius:14px;
    padding:4px;
    text-align:center;
    font-size:10px;
    font-weight:bold;
}

</style>
</head>

<body>

<div id="topbar">

<div>
💧 MONIAC DISPLAY
</div>

<div id="stats">

<div class="stat">
GDP:
<span id="gdpVal">0</span>
</div>

<div class="stat">
FLOW:
<span id="flowVal">0</span>
</div>

<div class="stat">
NET:
<span id="netVal">0</span>
</div>

</div>

<button id="resetBtn">
RESET
</button>

</div>

<div id="view">

<svg
id="svg"
viewBox="0 0 16000 12000"
preserveAspectRatio="xMidYMid meet"
></svg>

</div>

<script>

//
// ======================================================
// SVG
// ======================================================
//

const svg =
document.getElementById("svg");



//
// ======================================================
// STATE
// ======================================================
//

let tanks = [];
let pipes = [];

let economy = {};

let waterRects = {};

let params = {};



//
// ======================================================
// LOAD LAYOUT
// ======================================================
//

function loadLayout(){

    const raw =
        document.getElementById(
            "defaultLayout"
        ).textContent;

    const data =
        JSON.parse(raw);

    tanks =
        data.tanks || [];

    pipes =
        data.pipes || [];

    initialiseEconomy();

    buildScene();

    updateEconomy();

    setInterval(
        updateEconomy,
        100
    );
}



//
// ======================================================
// INITIALISE ECONOMY
// ======================================================
//

function initialiseEconomy(){

    economy = {};

    params = {};

    for(let t of tanks){

        economy[t.id] =
            200 + Math.random()*200;
    }

    for(let p of pipes){

        params[p.id] = 0.5;
    }
}



//
// ======================================================
// PATH
// ======================================================
//

function pathD(points){

    let d =
        `M ${points[0].x} ${points[0].y}`;

    for(let i=1;i<points.length;i++){

        d +=
            ` L ${points[i].x} ${points[i].y}`;
    }

    return d;
}



//
// ======================================================
// FLOW DOTS
// ======================================================
//

function addFlowDots(path, speed){

    const len =
        path.getTotalLength();

    const count =
        Math.max(
            2,
            Math.floor(len/180)
        );

    for(let i=0;i<count;i++){

        const dot =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "circle"
            );

        dot.setAttribute("r","5");
        dot.setAttribute("class","flowDot");

        svg.appendChild(dot);

        animateDot(
            dot,
            path,
            i*1200,
            speed
        );
    }
}



function animateDot(
    dot,
    path,
    delay,
    speed
){

    const len =
        path.getTotalLength();

    const start =
        performance.now()+delay;

    function frame(time){

        let t =
            (
                (time-start)
                *
                0.05
                *
                speed
            ) % len;

        const pt =
            path.getPointAtLength(t);

        dot.setAttribute(
            "cx",
            pt.x
        );

        dot.setAttribute(
            "cy",
            pt.y
        );

        requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
}



//
// ======================================================
// BUILD SCENE
// ======================================================
//

function buildScene(){

    svg.innerHTML = "";

//
// AUTO SIZE SVG
//

let minX = Infinity;
let minY = Infinity;
let maxX = -Infinity;
let maxY = -Infinity;

for (const t of tanks) {

    minX = Math.min(minX, t.x);
    minY = Math.min(minY, t.y);

    maxX = Math.max(maxX, t.x + t.w);
    maxY = Math.max(maxY, t.y + t.h);
}

for (const p of pipes) {

    for (const pt of p.points) {

        minX = Math.min(minX, pt.x);
        minY = Math.min(minY, pt.y);

        maxX = Math.max(maxX, pt.x);
        maxY = Math.max(maxY, pt.y);
    }
}

const padding = 300;

const width =
    (maxX - minX) + padding * 2;

const height =
    (maxY - minY) + padding * 2;

svg.setAttribute(
    "viewBox",
    `${minX - padding} ${minY - padding} ${width} ${height}`
);

svg.style.width = width + "px";
svg.style.height = height + "px";



    //
    // FILTER
    //

    const defs =
        document.createElementNS(
            "http://www.w3.org/2000/svg",
            "defs"
        );

    defs.innerHTML = `

<filter id="glow">

<feGaussianBlur
stdDeviation="3"
result="blur"
/>

<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>

</filter>

`;

    svg.appendChild(defs);



    //
    // PIPES
    //

    for(let pipe of pipes){

        const d =
            pathD(pipe.points);



        const outer =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "path"
            );

        outer.setAttribute("d",d);
        outer.setAttribute(
            "class",
            "pipeOuter"
        );

        svg.appendChild(outer);



        const inner =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "path"
            );

        inner.setAttribute("d",d);
        inner.setAttribute(
            "class",
            "pipeInner"
        );

        svg.appendChild(inner);



        addFlowDots(
            inner,
            1
        );



        //
        // VALVE
        //

        const mid =
            pipe.points[
                Math.floor(
                    pipe.points.length/2
                )
            ];



        const valve =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "circle"
            );

        valve.setAttribute(
            "cx",
            mid.x
        );

        valve.setAttribute(
            "cy",
            mid.y
        );

        valve.setAttribute(
            "r",
            "20"
        );

        valve.setAttribute(
            "class",
            "valve"
        );

        svg.appendChild(valve);



        //
        // SLIDER
        //

        const foreign =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "foreignObject"
            );

        foreign.setAttribute(
            "x",
            mid.x-65
        );

        foreign.setAttribute(
            "y",
            mid.y-90
        );

        foreign.setAttribute(
            "width",
            "130"
        );

        foreign.setAttribute(
            "height",
            "70"
        );



        const div =
            document.createElement("div");

        div.className =
            "sliderBox";

        div.innerHTML = `

<div>
FLOW
</div>

<input
type="range"
min="0"
max="1"
step="0.01"
value="0.5"
style="width:100px;"
>

<div>
<span id="disp_${pipe.id}">
0.50
</span>
</div>

`;

        foreign.appendChild(div);

        svg.appendChild(foreign);



        const slider =
            div.querySelector("input");

        slider.addEventListener(

            "input",

            (e)=>{

                params[pipe.id] =
                    parseFloat(
                        e.target.value
                    );

                document.getElementById(
                    `disp_${pipe.id}`
                ).innerText =
                    params[pipe.id]
                    .toFixed(2);
            }
        );
    }



    //
    // TANKS
    //

    for(let t of tanks){

        const g =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "g"
            );



        //
        // BODY
        //

        const body =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "rect"
            );

        body.setAttribute("x",t.x);
        body.setAttribute("y",t.y);
        body.setAttribute("width",t.w);
        body.setAttribute("height",t.h);
        body.setAttribute("rx","20");
        body.setAttribute(
            "class",
            "tankGlass"
        );

        g.appendChild(body);



        //
        // WATER
        //

        const water =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "rect"
            );

        water.setAttribute(
            "x",
            t.x+5
        );

        water.setAttribute(
            "y",
            t.y+t.h-10
        );

        water.setAttribute(
            "width",
            t.w-10
        );

        water.setAttribute(
            "height",
            "8"
        );

        water.setAttribute(
            "rx",
            "12"
        );

        water.setAttribute(
            "class",
            "water"
        );

        g.appendChild(water);

        waterRects[t.id] =
            water;



        //
        // LABEL
        //

        const label =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "text"
            );

        label.setAttribute(
            "x",
            t.x+t.w/2
        );

        label.setAttribute(
            "y",
            t.y-20
        );

        label.setAttribute(
            "class",
            "label"
        );

        label.textContent =
            t.label;

        g.appendChild(label);



        //
        // VALUE
        //

        const value =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "text"
            );

        value.setAttribute(
            "id",
            `tankVal_${t.id}`
        );

        value.setAttribute(
            "x",
            t.x+t.w/2
        );

        value.setAttribute(
            "y",
            t.y+t.h-18
        );

        value.setAttribute(
            "class",
            "value"
        );

        value.textContent =
            "0";

        g.appendChild(value);

        svg.appendChild(g);
    }
}



//
// ======================================================
// ECONOMY UPDATE
// ======================================================
//

function updateEconomy(){

    const delta = {};

    for(let t of tanks){

        delta[t.id] = 0;
    }



    //
    // PIPE FLOWS
    //

    for(let pipe of pipes){

        const from =
            pipe.startTank;

        const to =
            pipe.endTank;

        const valve =
            params[pipe.id];

        const source =
            economy[from];



        const flow =
            source
            *
            0.002
            *
            valve;



        delta[from] -= flow;
        delta[to] += flow;
    }



    //
    // UPDATE
    //

    for(let id in economy){

        economy[id] += delta[id];

        economy[id] =
            Math.max(
                20,
                Math.min(
                    800,
                    economy[id]
                )
            );
    }

    updateWater();
    updateStats();
}



//
// ======================================================
// WATER
// ======================================================
//

function updateWater(){

    for(let t of tanks){

        const val =
            economy[t.id];

        const pct =
            Math.max(
                0.04,
                Math.min(
                    1,
                    val/800
                )
            );

        const h =
            pct *
            (t.h-10);



        waterRects[t.id]
        .setAttribute(
            "height",
            h
        );

        waterRects[t.id]
        .setAttribute(
            "y",
            t.y+t.h-h-5
        );



        document.getElementById(
            `tankVal_${t.id}`
        ).textContent =
            val.toFixed(1);
    }
}



//
// ======================================================
// STATS
// ======================================================
//

function updateStats(){

    let gdp = 0;
    let flow = 0;

    for(let id in economy){

        gdp += economy[id];
    }

    for(let id in params){

        flow += params[id];
    }

    document.getElementById(
        "gdpVal"
    ).innerText =
        gdp.toFixed(1);

    document.getElementById(
        "flowVal"
    ).innerText =
        flow.toFixed(2);

    document.getElementById(
        "netVal"
    ).innerText =
        (
            gdp / Math.max(flow,0.1)
        ).toFixed(1);
}



//
// ======================================================
// RESET
// ======================================================
//

document.getElementById(
    "resetBtn"
).onclick = ()=>{

    initialiseEconomy();

    updateWater();
};



//
// ======================================================
// START
// ======================================================
//

window.onload = loadLayout;

</script>
